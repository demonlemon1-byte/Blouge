<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blouge</title>
    <style>
        /* Base Styling: Denim Blue Theme */
        @font-face {
  font-family: "LCDSolid"; /* Simplified name (no spaces) */
  src: url("../LcdSolid.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

body {
    margin: 0;
    background-color: #00008B;
    color: white;
    text-align: center;
    padding: 40px 20px;
    font-family: "LCDSolid", sans-serif; /* Applied here */
}
        
        section { padding: 50px 20px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .grey-section { background-color: #114111; } /* Example for separate color scales */

}

.game-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.game-button {
    display: block;
    padding: 20px 30px;
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 0 20px rgba(95,158,160,0.6);
    transition: all 0.3s ease;
}

.game-button:hover {
    background: rgba(0,0,0,0.7);
    transform: scale(1.05);
}

a.back {
    display: inline-block;
    margin-top: 30px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

</style>
</head>
  
<script>
  // This waits for the page to be fully "Ready"
  document.addEventListener("DOMContentLoaded", function() {
    const now = new Date();
    
    // Get components
    const month = now.getMonth() + 1; // 4
    const day = now.getDate();        // 14
    const year = now.getFullYear().toString().slice(-2); // 26

    // Construct the filename: dates/41426.html
    const fileName = `dates/${month}${day}${year}.html`;

    // Target the link
    const linkElement = document.getElementById('date-link');
    
    if (linkElement) {
      linkElement.href = fileName;
      console.log("Link updated to: " + fileName); // Check your browser console (F12) to see this
    } else {
      console.error("Could not find the element with ID 'date-link'");
    }
  });
</script>
    
<body>

<h1>Le Blouge</h1>
<p>Idk like I write stuff that's based and cool heheheha</p>
<div class="game-list">
  <a id="date-link" href="#"">
    <button type="button">Today's Blouge</button>
  </a>
    
<a href="previousblouge.html" type="button">Older Blouges</a>
</div>
